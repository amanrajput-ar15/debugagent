version: "3.8"

services:
  langfuse-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse_password
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_postgres:/var/lib/postgresql/data
    restart: unless-stopped

  langfuse-web:
    image: langfuse/langfuse:latest
    depends_on:
      - langfuse-db
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse_password@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: your_random_secret_here_32_chars
      SALT: your_random_salt_here
      NEXTAUTH_URL: http://localhost:3000
      TELEMETRY_ENABLED: "false"
    restart: unless-stopped

volumes:
  langfuse_postgres:
